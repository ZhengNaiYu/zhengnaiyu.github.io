<!doctype html>
<html lang="en" class="no-js">
  <head>
    <meta charset="utf-8">
    <title id="title"></title>
    <!-- FontAwesome from CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <meta name="HandheldFriendly" content="True">
    <meta name="MobileOptimized" content="320">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/css/main.css">
    <link rel="stylesheet" href="static/css/academicons.css">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" src="static/js/marked.min.js"></script>
    
    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>
  </head>

  <body>
    <div class="masthead">
      <div class="masthead__inner-wrap">
        <div class="masthead__menu">
          <nav id="site-nav" class="greedy-nav">
            <button><div class="navicon"></div></button>
            <ul class="visible-links">
              <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me" id="page-top-title"></a></li>
              <li class="masthead__menu-item"><a href="#about-me">About Me</a></li>
              <li class="masthead__menu-item"><a href="#news">News</a></li>
              <li class="masthead__menu-item"><a href="#publications">Publications</a></li>
              <li class="masthead__menu-item"><a href="#experience">Experience</a></li>
              <li class="masthead__menu-item"><a href="#awards">Honors and Awards</a></li>
            </ul>
            <ul class="hidden-links hidden"></ul>
          </nav>
        </div>
      </div>
    </div>

    <div id="main" role="main">
      <div class="sidebar sticky">
        <div itemscope itemtype="http://schema.org/Person" class="profile_box">
          <div class="author__avatar">
            <img src="static/assets/img/photo.png" class="author__avatar" alt="Profile">
          </div>
          <div class="author__content">
            <h3 class="author__name" id="home-subtitle"></h3>
            <p class="author__bio" id="home-role"></p>
          </div>
          <div class="author__urls-wrapper">
            <!-- <button class="btn btn--inverse">Follow</button> -->
            <ul class="author__urls social-icons">
              <li><div style="white-space: normal; margin-bottom: 1em;">The journey is the reward.</div></li>
              <li><i class="fa fa-fw fa-map-marker" aria-hidden="true"></i> Hong Kong</li>
              <li><a href="mailto:naiyuzheng2001@gmail.com"><i class="fas fa-fw fa-envelope" aria-hidden="true"></i> Email</a></li>
              <li><a href="https://github.com/ZhengNaiYu"><i class="fab fa-fw fa-github" aria-hidden="true"></i> Github</a></li>
              <li><a href="#"><i class="fas fa-fw fa-graduation-cap"></i> Google Scholar</a></li>
              <li><a href="#"><i class="fab fa-fw fa-linkedin" aria-hidden="true"></i> LinkedIn</a></li>
            </ul>
            <div class="author__urls_sm">
              <a href="mailto:naiyuzheng2001@gmail.com"><i class="fas fa-fw fa-envelope" aria-hidden="true"></i></a>
              <a href="https://github.com/ZhengNaiYu"><i class="fab fa-fw fa-github" aria-hidden="true"></i></a>
              <a href="#"><i class="fas fa-fw fa-graduation-cap"></i></a>
              <a href="#"><i class="fab fa-fw fa-linkedin" aria-hidden="true"></i></a>
            </div>
          </div>
        </div>
      </div>

      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            <div id="about-me"></div>
            <div id="home-md"></div>
            
            <h1 id="news">🔥 News</h1>
            <div id="news-md"></div>
            
            <h1 id="publications">📝 Publications</h1>
            <div id="publications-md"></div>

            <h1 id="experience">🎓 Experience</h1>
            <div id="experience-md"></div>

            <h1 id="awards">🎖 Honors and Awards</h1>
            <div id="awards-md"></div>
          </section>
        </div>
      </article>
      
    </div>

    <!-- Footer -->
    <div class="page__footer">
      <footer>
        <div class="page__footer-follow">
          <ul class="social-icons"></ul>
        </div>
        <div class="page__footer-copyright" id="copyright-text"></div>
      </footer>
    </div>
    <script src="static/js/main.min.js"></script>
  </body>
</html>
